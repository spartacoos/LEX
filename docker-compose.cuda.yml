# Optional overlay for Linux machines with an NVIDIA GPU.
# Requires the NVIDIA Container Toolkit on the host:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.cuda.yml up -d
#
# Not needed for local dev on Apple Silicon — use MLX on the host instead.
# Not needed on Linux dev if you're running llama.cpp directly on the host.
#
# This file exists so "production deploy on a GPU server" is a single
# command away when we want it.
services:
  llm:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      --host 0.0.0.0
      --port 8080
      --model /models/gemma-2-2b-it-Q4_K_M.gguf
      --n-gpu-layers 99
      --ctx-size 8192
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
